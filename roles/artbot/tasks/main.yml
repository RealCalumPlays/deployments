---
- name: Create artbot user
  ansible.builtin.user:
    name: artbot
    shell: /bin/bash
  tags: artbot_app

- name: Download nvm installer
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh
    dest: /tmp/install.sh
    mode: "0755"
  become: true
  become_user: artbot
  tags: artbot_app

- name: Execute the nvm installer
  ansible.builtin.command: /tmp/install.sh
  args:
    creates: /home/artbot/.nvm/nvm.sh
  become: true
  become_user: artbot
  tags: artbot_app

- name: Install nvm
  ansible.builtin.shell: source /home/artbot/.nvm/nvm.sh && nvm install v18.19.0
  args:
    executable: /bin/bash
  become: true
  become_user: artbot
  register: artbot_nvm_out
  changed_when: "not 'is already installed' in artbot_nvm_out.stderr"
  tags: artbot_app

- name: Install pm2
  ansible.builtin.shell: source /home/artbot/.nvm/nvm.sh && npm install -g pm2
  args:
    executable: /bin/bash
  register: artbot__pm2_install
  become: true
  become_user: artbot
  changed_when: "'added' in artbot__pm2_install.stdout or 'updated' in artbot__pm2_install.stdout"
  tags: artbot_app

- name: Setup pm2 service
  ansible.builtin.shell:
    env PATH=$PATH:/home/artbot/.nvm/versions/node/v18.19.0/bin /home/artbot/.nvm/versions/node/v18.19.0/lib/node_modules/pm2/bin/pm2
    startup systemd -u artbot --hp /home/artbot
  args:
    executable: /bin/bash
    creates: /home/artbot/.config/systemd/user/pm2-artbot.service
  tags: artbot_app

- name: Install pm2-logrotate
  ansible.builtin.shell: source /home/artbot/.nvm/nvm.sh && pm2 install pm2-logrotate
  args:
    executable: /bin/bash
    creates: /home/artbot/.pm2/modules/pm2-logrotate
  become: true
  become_user: artbot
  tags: artbot_app

- name: Clone Artbot github repository  # noqa: latest[git]
  ansible.builtin.git:
    repo: https://github.com/Haidra-Org/artbot
    dest: /home/artbot/artbot
    clone: true
    update: true
    force: true
    version: HEAD
  become: true
  become_user: artbot
  register: artbot_git
  tags:
    - artbot_app
    - update

- name: Install artbot npm
  ansible.builtin.shell: source /home/artbot/.nvm/nvm.sh && npm install
  args:
    executable: /bin/bash
    chdir: /home/artbot/artbot
  become: true
  become_user: artbot
  changed_when: artbot_git.changed is true or artbot_force_build
  tags:
    - artbot_app
    - update

- name: Build artbot
  ansible.builtin.shell: source /home/artbot/.nvm/nvm.sh && npm run build
  args:
    executable: /bin/bash
    chdir: /home/artbot/artbot
  environment:
    NEXT_PUBLIC_NO_BETA: "true"
    ARTBOT_STATUS_API: "{{ artbot_status_api }}"
  become: true
  become_user: artbot
  changed_when: artbot_git.changed is true
  when: artbot_git.changed is true or artbot_force_build
  tags:
    - artbot_app
    - update

- name: Ensure artbot deploy location exists
  ansible.builtin.file:
    path: /home/artbot/builds
    owner: artbot
    group: artbot
    state: directory
    mode: "0755"
  tags:
    - artbot_app
    - update

- name: Ensure new build is hashstamped
  ansible.builtin.copy:
    src: /home/artbot/artbot/.next/standalone/
    remote_src: true
    dest: /home/artbot/builds/{{ artbot_git.after }}
    owner: artbot
    group: artbot
    mode: "0755"
  when: artbot_git.changed is true or artbot_force_build
  tags:
    - artbot_app
    - update

- name: Ensure 'latest' symlink points to the latest build
  ansible.builtin.file:
    path: /home/artbot/builds/latest
    src: /home/artbot/builds/{{ artbot_git.after }}
    force: true
    state: link
  when: artbot_git.changed is true or artbot_force_build
  tags:
    - artbot_app
    - update

- name: Ensure old artbot process is stopped
  ansible.builtin.shell: source /home/artbot/.nvm/nvm.sh && pm2 stop artbot && pm2 delete artbot
  args:
    executable: /bin/bash
    chdir: /home/artbot/builds/latest
  become: true
  become_user: artbot
  when: artbot_git.changed is true or artbot_force_build
  register: artbot_stop
  changed_when: artbot_stop.rc == 0
  failed_when:
    - artbot_stop.rc != 0
    - "not 'Process or Namespace artbot not found' in artbot_stop.stderr"
  tags:
    - artbot_app
    - update

- name: Ensure artbot is started
  ansible.builtin.shell: source /home/artbot/.nvm/nvm.sh && pm2 start ecosystem.config.js --only artbot && pm2 save
  args:
    executable: /bin/bash
    chdir: /home/artbot/builds/latest
  become: true
  become_user: artbot
  changed_when: artbot_git.changed is true
  when: artbot_git.changed is true or artbot_force_build
  tags:
    - artbot_app
    - update
