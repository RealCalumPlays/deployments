---
# Handlers for horde_stats_exporter role

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: Set venv ownership
  ansible.builtin.file:
    path: "{{ horde_stats_exporter_install_dir }}/venv"
    state: directory
    owner: "{{ horde_stats_exporter_user }}"
    group: "{{ horde_stats_exporter_user }}"
    recurse: true
  become: true

- name: Restart horde-exporter
  ansible.builtin.systemd:
    name: horde-exporter
    state: restarted
  become: true
