---
# Deploy AiHordeFrontpage (Angular SSR + Express)
# Supports two deploy modes:
#   docker — build and run inside a Docker container (default)
#   native — install Node.js on the host, build and run directly

- name: Validate deploy mode
  ansible.builtin.assert:
    that:
      - aihorde_frontpage_deploy_mode in ['docker', 'native']
    fail_msg: >-
      Invalid aihorde_frontpage_deploy_mode '{{ aihorde_frontpage_deploy_mode }}'.
      Must be 'docker' or 'native'.

- name: Create AiHordeFrontpage directories
  ansible.builtin.file:
    path: "{{ aihorde_frontpage_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true

- name: Template AiHordeFrontpage environment file
  ansible.builtin.template:
    src: frontpage.env.j2
    dest: "{{ aihorde_frontpage_base_dir }}/.env"
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Include Docker deployment tasks
  ansible.builtin.include_tasks: docker.yml
  when: aihorde_frontpage_deploy_mode == 'docker'

- name: Include native deployment tasks
  ansible.builtin.include_tasks: native.yml
  when: aihorde_frontpage_deploy_mode == 'native'
