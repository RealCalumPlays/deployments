---
# Deploy Tempo distributed tracing backend via Docker Compose
# Tempo runs as part of the monitoring Docker Compose stack

- name: Create Tempo config directory
  ansible.builtin.file:
    path: "{{ tempo_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Create Tempo data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "10001"
    group: "10001"
    mode: "0755"
  become: true
  loop:
    - "{{ tempo_data_dir }}"
    - "{{ tempo_data_dir }}/wal"
    - "{{ tempo_data_dir }}/blocks"
    - "{{ tempo_data_dir }}/generator"
    - "{{ tempo_data_dir }}/generator/wal"
    - "{{ tempo_data_dir }}/generator/traces"

- name: Template Tempo configuration
  ansible.builtin.template:
    src: tempo.yaml.j2
    dest: "{{ tempo_config_dir }}/tempo.yaml"
    owner: root
    group: "10001"
    mode: "0640"
    backup: true
  become: true
  notify: Restart monitoring stack
