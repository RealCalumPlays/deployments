---
# Deploy Loki log aggregation backend via Docker Compose
# Loki runs as part of the monitoring Docker Compose stack

- name: Create Loki config directory
  ansible.builtin.file:
    path: "{{ loki_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Create Loki data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "10001"
    group: "10001"
    mode: "0755"
  become: true
  loop:
    - "{{ loki_data_dir }}"
    - "{{ loki_data_dir }}/index"
    - "{{ loki_data_dir }}/index_cache"
    - "{{ loki_data_dir }}/retention"
    - "{{ loki_data_dir }}/chunks"
    - "{{ loki_data_dir }}/rules"

- name: Template Loki configuration
  ansible.builtin.template:
    src: loki.yaml.j2
    dest: "{{ loki_config_dir }}/loki.yaml"
    owner: root
    group: "10001"
    mode: "0640"
    backup: true
  become: true
  notify: Restart monitoring stack
