- name: Add Grafana RPM repository
  ansible.builtin.yum_repository:
    name: grafana
    description: Grafana OSS packages
    baseurl: https://rpm.grafana.com
    gpgcheck: true
    gpgkey: https://rpm.grafana.com/gpg.key
    enabled: true
  become: true

- name: Install Alloy package (RHEL/CentOS)
  ansible.builtin.dnf:
    name: "alloy-{{ horde_alloy_version }}"
    state: present
  become: true
  notify: Restart alloy
