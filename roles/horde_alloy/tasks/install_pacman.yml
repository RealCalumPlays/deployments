---
# Install Grafana Alloy from arch AUR using yay.

- name: Install prerequisite packages
  community.general.pacman:
    name:
      - apt-transport-https
      - yay
    state: present
  become: true

- name: Install Alloy package
  community.general.pacman:
    name: "grafana-alloy-bin"
    state: present
    executable: yay
  become: true
  notify: Restart alloy
