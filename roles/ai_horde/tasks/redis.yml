---
# Optional local Redis provisioning for AI-Horde (native mode).
# Installs Redis via system packages and configures bind address.

- name: Install Redis packages
  ansible.builtin.apt:
    name:
      - redis-server
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ai_horde_start_services | bool

- name: Configure Redis bind address
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^bind '
    line: "bind {{ ai_horde_redis_host }} -::1"
  become: true
  when: ai_horde_start_services | bool
  notify: Restart Redis

- name: Configure Redis port
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^port '
    line: "port {{ ai_horde_redis_port }}"
  become: true
  when: ai_horde_start_services | bool
  notify: Restart Redis

- name: Ensure Redis service is enabled and started
  ansible.builtin.systemd:
    name: redis-server
    enabled: true
    state: started
  become: true
  when: ai_horde_start_services | bool

- name: Wait for Redis to accept connections
  ansible.builtin.wait_for:
    host: "{{ ai_horde_redis_host }}"
    port: "{{ ai_horde_redis_port }}"
    timeout: 30
  when: ai_horde_start_services | bool
