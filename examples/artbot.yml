---
- name: Deploy artbot
  hosts: artbot_revproxy_server

  roles:
    - role: haidra.deployments.artbot
      tags: artbot
    - role: haidra.deployments.artbot_revproxy
      vars:
        artbot_revproxy_domain: artbot.rocks
        artbot_revproxy_server: 127.0.0.1
        artbot_revproxy_email: your.email@example.com
      tags: artbot_revproxy
