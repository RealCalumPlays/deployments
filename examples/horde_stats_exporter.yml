---
# Example playbook for deploying AI Horde stats exporter
# Usage: ansible-playbook -i inventory.yml horde_stats_exporter.yml

- name: Deploy AI Horde Stats Exporter
  hosts: monitoring
  become: true

  vars:
    # Git ref to install (branch, tag, or commit hash)
    # horde_stats_exporter_repo_ref: main

    # Exporter configuration
    horde_stats_exporter_port: 9150
    horde_stats_exporter_api_base_url: "https://aihorde.net/api/v2"

    # Enable downsampling
    horde_stats_exporter_enable_downsampling: true
    horde_stats_exporter_prometheus_url: "http://localhost:9090"

  roles:
    - haidra.deployments.horde_stats_exporter

  post_tasks:
    - name: Verify exporter is running
      ansible.builtin.uri:
        url: "http://localhost:{{ horde_stats_exporter_port }}/metrics"
        return_content: true
      register: metrics
      retries: 5
      delay: 5
      until: metrics.status == 200

    - name: Display exporter status
      ansible.builtin.debug:
        msg: "AI Horde Stats Exporter is running on port {{ horde_stats_exporter_port }}"
