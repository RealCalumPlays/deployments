---
all:
  hosts:
    artbot_server:
      ansible_host: 10.0.0.1  # Put your artbot server IP here
      ansible_become: true
    regen_worker:
      # Put your regen worker IP here.
      # You can use `localhost` for your current PC.
      ansible_host: 10.0.0.2
      ansible_become: true
      # You can use your own username if you run on `localhost`.
      horde_regen_worker_username: hworker
      horde_regen_worker_api_key: "abcdefg012345"
      horde_regen_worker_dreamer_name: My Asible Dreamer
      horde_regen_worker_max_power: 32
      horde_regen_worker_allow_controlnet: true
      horde_regen_worker_allow_lora: true
      horde_regen_worker_models_to_load:
        - TOP 5
        - Fustercluck
        - SwamPonyXL
