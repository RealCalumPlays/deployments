---
# Helper playbook: renders bridgeData.yaml for the integration worker.
# Called by local_deploy.sh — not intended to be run standalone.
# All variables are passed via -e flags from the shell script.

- name: Render worker bridgeData.yaml for integration
  hosts: localhost
  connection: local
  become: true
  gather_facts: false

  # Defaults for variables that bridgeData.yaml.j2 requires but that
  # are not critical for integration testing.  The shell script
  # overrides the important ones via -e.
  vars:
    horde_regen_worker_priority_usernames: []
    horde_regen_worker_queue_size: 1
    horde_regen_worker_max_batch: 1
    horde_regen_worker_safety_on_gpu: false
    horde_regen_worker_require_upfront_kudos: false
    horde_regen_worker_blacklist: []
    horde_regen_worker_censor_nsfw: false
    horde_regen_worker_censorlist: []
    horde_regen_worker_allow_img2img: true
    horde_regen_worker_allow_painting: true
    horde_regen_worker_allow_unsafe_ip: true
    horde_regen_worker_allow_post_processing: true
    horde_regen_worker_allow_controlnet: false
    horde_regen_worker_allow_sdxl_controlnet: false
    horde_regen_worker_allow_lora: false
    horde_regen_worker_max_lora_cache_size: 10
    horde_regen_worker_dynamic_models: false
    horde_regen_worker_number_of_dynamic_models: 0
    horde_regen_worker_max_models_to_download: 10
    horde_regen_worker_stats_output_frequency: 30
    horde_regen_worker_moderate_performance_mode: false
    horde_regen_worker_high_performance_mode: false
    horde_regen_worker_exit_on_unhandled_faults: true
    horde_regen_worker_scribe_name: "integration-scribe"
    horde_regen_worker_kai_url: "http://localhost:5000"
    horde_regen_worker_max_length: 80
    horde_regen_worker_max_context_length: 1024
    horde_regen_worker_branded_model: true
    horde_regen_worker_alchemist_name: "integration-alchemist"
    horde_regen_worker_forms:
      - "caption"
    horde_regen_worker_models_dir: "models"
    horde_regen_worker_username: "root"
    horde_regen_worker_amd_gpu: false
    horde_regen_worker_environment: ""
    horde_regen_worker_service_name: "ai_horde_worker"

  tasks:
    - name: Template bridgeData.yaml
      ansible.builtin.template:
        src: "../../roles/horde_regen_worker/templates/bridgeData.yaml.j2"
        dest: "{{ horde_regen_worker_runtime_dir }}/bridgeData.yaml"
        mode: "0600"
