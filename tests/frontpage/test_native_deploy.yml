---
# idempotency: skip
# Playbook for testing native (bare-metal) deployment of AiHordeFrontpage.
# Run against a Debian container via docker connection by test_native_deploy.sh.

- name: Deploy AiHordeFrontpage (native mode)
  hosts: all
  become: true
  gather_facts: true

  vars:
    aihorde_frontpage_deploy_mode: native
    aihorde_frontpage_base_dir: /opt/aihorde-frontpage
    aihorde_frontpage_build_config: production
    aihorde_frontpage_listen: "0.0.0.0"
    aihorde_frontpage_port: 8006
    aihorde_frontpage_repo: "https://github.com/Haidra-Org/AiHordeFrontpage.git"
    aihorde_frontpage_repo_version: "master"
    aihorde_frontpage_start_services: true
    aihorde_frontpage_force_build: true

  roles:
    - aihorde_frontpage
