---
# Test playbook: horde_regen_worker role — template rendering only.
#
# Renders bridgeData.yaml and the systemd service unit using the role's
# templates and defaults, then asserts on the generated file contents.
#
# We load the role's defaults via include_vars so we only override the
# variables we want to test.  This keeps the test resilient to new
# defaults being added to the role.

- name: Test regen worker template rendering (positive)
  hosts: testhost
  become: true
  vars:
    # Override key variables for assertion
    horde_regen_worker_username: "testworker"
    horde_regen_worker_clone_dir: "horde-worker-regen"
    horde_regen_worker_runtime_dir: "horde-worker-regen"
    horde_regen_worker_service_name: "ai_horde_worker"
    horde_regen_worker_environment: ""
    horde_regen_worker_amd_gpu: false
    horde_regen_worker_models_dir: "regen_worker_models"
    horde_regen_worker_horde_url: "https://aihorde.net"
    horde_regen_worker_api_key: "test-api-key-12345"
    horde_regen_worker_priority_usernames: ["priority_user"]
    horde_regen_worker_max_threads: 1
    horde_regen_worker_queue_size: 1
    horde_regen_worker_max_batch: 1
    horde_regen_worker_max_power: 8
    horde_regen_worker_allow_unsafe_ip: true
    horde_regen_worker_require_upfront_kudos: false
    horde_regen_worker_dreamer_name: "test-dreamer"
    horde_regen_worker_blacklist: []
    horde_regen_worker_nsfw: false
    horde_regen_worker_censor_nsfw: false
    horde_regen_worker_censorlist: []
    horde_regen_worker_allow_img2img: true
    horde_regen_worker_allow_painting: true
    horde_regen_worker_allow_controlnet: true
    horde_regen_worker_allow_sdxl_controlnet: false
    horde_regen_worker_allow_lora: true
    horde_regen_worker_max_lora_cache_size: 10
    horde_regen_worker_allow_post_processing: true
    horde_regen_worker_safety_on_gpu: false
    horde_regen_worker_dynamic_models: false
    horde_regen_worker_number_of_dynamic_models: 0
    horde_regen_worker_max_models_to_download: 10
    horde_regen_worker_stats_output_frequency: 30
    horde_regen_worker_moderate_performance_mode: false
    horde_regen_worker_high_performance_mode: false
    horde_regen_worker_exit_on_unhandled_faults: true
    horde_regen_worker_scribe_name: "test-scribe"
    horde_regen_worker_kai_url: "http://localhost:5000"
    horde_regen_worker_max_length: 80
    horde_regen_worker_max_context_length: 1024
    horde_regen_worker_branded_model: true
    horde_regen_worker_alchemist_name: "test-alchemist"
    horde_regen_worker_forms:
      - "caption"
      - "nsfw"
      - "interrogation"
      - "post-process"
    horde_regen_worker_models_to_load:
      - "stable_diffusion"
      - "TOP 2"
    horde_regen_worker_models_to_skip:
      - "pix2pix"

  tasks:
    - name: Create worker home directory
      ansible.builtin.file:
        path: "/home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_runtime_dir }}"
        state: directory
        mode: "0755"

    - name: Template bridgeData.yaml
      ansible.builtin.template:
        src: "../../roles/horde_regen_worker/templates/bridgeData.yaml.j2"
        dest: "/home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_runtime_dir }}/bridgeData.yaml"
        mode: "0600"

    - name: Read bridgeData.yaml
      ansible.builtin.slurp:
        src: "/home/{{ horde_regen_worker_username }}/{{ horde_regen_worker_runtime_dir }}/bridgeData.yaml"
      register: _bridge

    - name: Assert bridgeData has correct horde_url
      ansible.builtin.assert:
        that:
          - "'horde_url: https://aihorde.net' in _bridge.content | b64decode"

    - name: Assert bridgeData has correct api_key
      ansible.builtin.assert:
        that:
          - "'api_key: test-api-key-12345' in _bridge.content | b64decode"

    - name: Assert bridgeData has models configuration
      ansible.builtin.assert:
        that:
          - "'stable_diffusion' in _bridge.content | b64decode"
          - "'TOP 2' in _bridge.content | b64decode"
          - "'pix2pix' in _bridge.content | b64decode"

    - name: Assert bridgeData has worker name
      ansible.builtin.assert:
        that:
          - "'dreamer_name: test-dreamer' in _bridge.content | b64decode"

    - name: Assert bridgeData has feature toggles
      ansible.builtin.assert:
        that:
          - "'nsfw: False' in _bridge.content | b64decode"
          - "'allow_img2img: True' in _bridge.content | b64decode"
          - "'allow_controlnet: True' in _bridge.content | b64decode"
          - "'allow_lora:  True' in _bridge.content | b64decode"

    - name: Assert bridgeData has cache_home with correct path
      ansible.builtin.assert:
        that:
          - "'cache_home: /home/testworker/regen_worker_models' in _bridge.content | b64decode"

    - name: Assert bridgeData has scribe and alchemist config
      ansible.builtin.assert:
        that:
          - "'scribe_name: test-scribe' in _bridge.content | b64decode"
          - "'alchemist_name: test-alchemist' in _bridge.content | b64decode"
          - "'kai_url: http://localhost:5000' in _bridge.content | b64decode"

    - name: Assert bridgeData has terminal UI disabled
      ansible.builtin.assert:
        that:
          - "'disable_terminal_ui: true' in _bridge.content | b64decode"

    - name: Template systemd service unit
      ansible.builtin.template:
        src: "../../roles/horde_regen_worker/templates/ai_horde_worker.j2"
        dest: "/tmp/ai_horde_worker_nvidia.service"
        mode: "0644"

    - name: Read systemd service unit
      ansible.builtin.slurp:
        src: "/tmp/ai_horde_worker_nvidia.service"
      register: _service

    - name: Assert systemd unit has correct fields (NVIDIA)
      ansible.builtin.assert:
        that:
          - "'WorkingDirectory=' in _service.content | b64decode"
          - "'/home/testworker/horde-worker-regen' in _service.content | b64decode"
          - "'horde-bridge.sh' in _service.content | b64decode"
          - "'Restart=always' in _service.content | b64decode"
          - "'KillSignal=SIGINT' in _service.content | b64decode"
          - "'RestartSec=15' in _service.content | b64decode"
          - "'TimeoutStopSec=120' in _service.content | b64decode"

    - name: Assert NVIDIA unit does NOT use rocm bridge
      ansible.builtin.assert:
        that:
          - "'horde-bridge-rocm.sh' not in _service.content | b64decode"

    - name: Template systemd service unit (AMD)
      ansible.builtin.template:
        src: "../../roles/horde_regen_worker/templates/ai_horde_worker.j2"
        dest: "/tmp/ai_horde_worker_amd.service"
        mode: "0644"
      vars:
        horde_regen_worker_amd_gpu: true

    - name: Read AMD service unit
      ansible.builtin.slurp:
        src: /tmp/ai_horde_worker_amd.service
      register: _amd_service

    - name: Assert AMD unit uses rocm bridge script
      ansible.builtin.assert:
        that:
          - "'horde-bridge-rocm.sh' in _amd_service.content | b64decode"

    - name: Assert AMD unit does NOT use standard bridge
      ansible.builtin.assert:
        that:
          - "'horde-bridge.sh' not in _amd_service.content | b64decode"
