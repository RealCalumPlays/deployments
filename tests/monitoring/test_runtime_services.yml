---
# requires: docker-daemon
# idempotency: skip
# Runtime integration test: starts Docker Compose services and validates health.
#
# Unlike render-only tests (monitoring_start_services: false), this test
# actually boots the monitoring stack and verifies that Mimir, MinIO,
# Grafana, and Memcached are healthy and accepting connections.
#
# Requirements:
#   - Docker daemon running in the test container (--privileged)
#   - Sufficient memory (≥2GB recommended)
#
# This test uses a minimal configuration: Mimir + Grafana + MinIO (core stack),
# no Loki/Tempo/Pyroscope, no HAProxy, no dashboards.

- name: Test runtime services - core stack health
  hosts: testhost
  become: true
  gather_facts: true

  vars:
    monitoring_install_mimir: true
    monitoring_install_grafana: true
    monitoring_install_loki: false
    monitoring_install_tempo: false
    monitoring_install_pyroscope: false
    monitoring_configure_firewall: false
    monitoring_configure_haproxy: false
    grafana_admin_password: "test-runtime-pass"
    minio_root_password: "test-minio-secret-12345"
    monitoring_application_tenant_id: "app-test"
    monitoring_infrastructure_tenant_id: "infra-test"
    monitoring_public_tenant_id: "public-test"
    grafana_anonymous_enabled: false
    grafana_provision_dashboards: false
    # Actually start services — the point of this test
    monitoring_start_services: true
    mimir_backup_enabled: false
    # Reduce resource footprint for CI containers
    mimir_memory_limit: "1g"
    minio_memory_limit: "256m"
    grafana_memory_limit: "256m"
    mimir_memcached_memory_mb: 64
    mimir_memcached_memory_limit: "128m"

  roles:
    - role: horde_monitoring

  post_tasks:
    - name: Verify MinIO health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:9000/minio/health/live"
        method: GET
        status_code: 200
      register: minio_health
      retries: 20
      delay: 3
      until: minio_health.status == 200

    - name: Assert MinIO is healthy
      ansible.builtin.assert:
        that:
          - minio_health.status == 200
        fail_msg: "MinIO health check failed"

    - name: Verify Mimir ready endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:9009/ready"
        method: GET
        status_code: 200
      register: mimir_health
      retries: 25
      delay: 5
      until: mimir_health.status == 200

    - name: Assert Mimir is ready
      ansible.builtin.assert:
        that:
          - mimir_health.status == 200
        fail_msg: "Mimir ready check failed"

    - name: Verify Grafana health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:3000/api/health"
        method: GET
        status_code: 200
      register: grafana_health
      retries: 20
      delay: 3
      until: grafana_health.status == 200

    - name: Assert Grafana is healthy
      ansible.builtin.assert:
        that:
          - grafana_health.status == 200
        fail_msg: "Grafana health check failed"

    - name: Push a test metric to Mimir via remote_write
      ansible.builtin.uri:
        url: "http://127.0.0.1:9009/api/v1/push"
        method: POST
        headers:
          Content-Type: "application/x-protobuf"
          X-Scope-OrgID: "app-test"
        # Mimir returns 400 for an empty/invalid protobuf body,
        # but 200/202 for valid ones, and crucially NOT 404/503.
        # A 400 confirms the endpoint is live and processing requests.
        status_code: [200, 202, 400]
      register: mimir_push

    - name: Assert Mimir push endpoint is responsive
      ansible.builtin.assert:
        that:
          - mimir_push.status in [200, 202, 400]
        fail_msg: "Mimir push endpoint is not responding (got {{ mimir_push.status }})"

    - name: Query Mimir app tenant
      ansible.builtin.uri:
        url: "http://127.0.0.1:9009/prometheus/api/v1/query?query=up"
        method: GET
        headers:
          X-Scope-OrgID: "app-test"
        status_code: 200
      register: mimir_query_app

    - name: Assert Mimir app tenant query works
      ansible.builtin.assert:
        that:
          - mimir_query_app.status == 200
          - "'resultType' in (mimir_query_app.content | default(mimir_query_app.json | to_json))"
        fail_msg: "Mimir query failed for app tenant"

    - name: Query Mimir infra tenant
      ansible.builtin.uri:
        url: "http://127.0.0.1:9009/prometheus/api/v1/query?query=up"
        method: GET
        headers:
          X-Scope-OrgID: "infra-test"
        status_code: 200
      register: mimir_query_infra

    - name: Assert Mimir infra tenant query works
      ansible.builtin.assert:
        that:
          - mimir_query_infra.status == 200

    - name: List Grafana datasources via API
      ansible.builtin.uri:
        url: "http://127.0.0.1:3000/api/datasources"
        method: GET
        user: "admin"
        password: "test-runtime-pass"
        force_basic_auth: true
        status_code: 200
      register: grafana_ds

    - name: Assert expected datasources exist
      ansible.builtin.assert:
        that:
          - grafana_ds.json | length >= 2
          - grafana_ds.json | map(attribute='name') | select('search', 'AI Horde App') | list | length > 0
          - grafana_ds.json | map(attribute='name') | select('search', 'Infrastructure') | list | length > 0
        fail_msg: "Expected datasources not found in Grafana: {{ grafana_ds.json | map(attribute='name') | list }}"

    - name: List running Docker containers
      ansible.builtin.command: docker ps --format '{{ '{{' }}.Names{{ '}}' }}'
      register: docker_ps
      changed_when: false

    - name: Assert core containers are running
      ansible.builtin.assert:
        that:
          - "'mimir' in docker_ps.stdout"
          - "'minio' in docker_ps.stdout"
          - "'grafana' in docker_ps.stdout"
          - "'memcached' in docker_ps.stdout"
        fail_msg: "Expected containers not running: {{ docker_ps.stdout_lines }}"

    - name: Check systemd service status
      ansible.builtin.systemd:
        name: mimir-monitoring
      register: mimir_svc

    - name: Assert systemd service is active
      ansible.builtin.assert:
        that:
          - mimir_svc.status.ActiveState == 'active'
        fail_msg: "mimir-monitoring service is not active: {{ mimir_svc.status.ActiveState }}"

    - name: Stop monitoring stack
      ansible.builtin.command: docker compose down
      args:
        chdir: /opt/mimir
      changed_when: true
