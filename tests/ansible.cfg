[defaults]
# Skip automatic fact gathering for faster render-only tests. Plays that
# exercise fact-dependent role paths must opt in with `gather_facts: true`.
gathering = explicit

# Silence the Python-interpreter discovery warning without changing
# the auto-detection behaviour.
interpreter_python = auto_silent

[connection]
# Pipelining executes modules by piping them over stdin instead of
# copying a temporary file then executing it — one fewer round-trip
# per task.  Safe for both the Docker and local connection plugins
# used in tests (no sudo requiretty issue).
pipelining = True